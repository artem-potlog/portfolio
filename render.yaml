# Render Blueprint — Artem Potlog personal site (static)
# Deploy: push this repo to GitHub, then in Render: New + > Blueprint > pick the repo.
services:
  - type: web
    name: artem-potlog
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
